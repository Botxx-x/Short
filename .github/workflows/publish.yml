name: Publish Short

on:
  schedule:
    # Every 3 hours = 8 runs/day. Comfortably under YouTube's default
    # 100 uploads/day quota (see README for context on that number).
    # GitHub may delay scheduled runs by a few minutes under load — that's
    # normal and not something to debug.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write   # needed to commit the updated topic-history file back

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg and caption font
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python -m src.run

      - name: Commit updated topic history
        run: |
          git config user.name "shorts-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/used_topics.json
          git diff --staged --quiet || git commit -m "Update topic history [skip ci]"
          git push
